    <style>
        .box1 {
            border: 1px solid #000;

            width: 200px;
            position: relative;
            margin: 200px auto;
        }
        
        .divt {
            width: 200px;
            height: 100px;
            position: absolute;
            background: red;
            border: 1px solid #000;
            z-index: 1;
        }
        
        .div1 {
            width: 140px;
            height: 140px;
            position: absolute;
            transform: rotate(45deg);
            transform: rotate3d(0, 1, 0, 50deg);
            z-index: 2;
            top: 30px;
        }
        
        .left {
            top: 30px;
            left: -70px;
        }
        
        .right {
            top: 30px;
            right: -70px;
        }
        
        .div1 div {
            border: 1px solid #000;
            width: 100%;
            height: 100%;
            transform: rotateZ(45deg);
            background: #ffffff;
        }
    </style>
</head>
