<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .container {
            position: relative;
        }
        .top {
            position: absolute;
            width: 100px;
            height: 100px;
            border:1px solid red;
            transform: scaleY(1) perspective(4.5px) rotateX(-5deg);
            transform-origin: top;
        }

        .right {
            position: absolute;
            width: 100px;
            height: 100px;
            /* background-color: red; */
            border:1px solid red;
            transform: scaleX(1) perspective(4.5px) rotateY(-5deg);
            transform-origin: right;
        }

        .bottom {
            position: absolute;
            width: 100px;
            height: 100px;
            /* background-color: pink; */
            border:1px solid red;
            transform: scaleY(1) perspective(4.5px) rotateX(5deg);
            transform-origin: bottom;
        }

        .left {
            position: absolute;
            width: 100px;
            height: 100px;
            /* background-color: green; */
            border:1px solid red;
            transform: scaleX(1) perspective(4.5px) rotateY(5deg);
            transform-origin: left;
        }
        .content{
         position: absolute;
         top: 34px;
         left: 34px;  
         width: 32px;
         height: 32px;
         border:1px solid blue;
         /* background-color: black;; */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top"></div>
        <div class="right"></div>
        <div class="bottom"></div>
        <div class="left"></div>
        <div class="content"></div>
    </div>
    <div class="box">

    </div>

</body>

</html>
